name: Build for GL-MT3600BE (Beryl 7) on Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build for Beryl 7
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install setuptools pyelftools

      - name: Cache OpenWrt build tree
        id: cache-openwrt
        uses: actions/cache@v5
        with:
          path: |
            openwrt/
            openwrt-build/
          key: ${{ runner.os }}-openwrt-21.02-mt7987-beryl7

      - name: Clone OpenWrt 21.02 and add MediaTek feed
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: |
          git clone -b openwrt-21.02 https://git.openwrt.org/openwrt/openwrt.git openwrt
          cd openwrt
          echo "src-git mtk_feed https://git01.mediatek.com/openwrt/feeds/mtk-openwrt-feeds.git;openwrt-21.02" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy packages to build tree
        run: |
          cp -r kmod-amneziawg openwrt/package/
          cp -r amneziawg-tools openwrt/package/
          cp -r luci-proto-amneziawg openwrt/package/

      - name: Configure for GL-MT3600BE and select packages
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7987=y
          CONFIG_TARGET_mediatek_mt7987_DEVICE_glinet_gl-mt3600be=y
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF
          make defconfig

      - name: Build packages
        run: |
          cd openwrt
          make -j$(nproc) package/kmod-amneziawg/compile
          make -j$(nproc) package/amneziawg-tools/compile
          make -j$(nproc) package/luci-proto-amneziawg/compile

      - name: Prepare artifacts
        run: |
          mkdir -p release
          postfix="v${GITHUB_REF_NAME}_aarch64_cortex-a53_mediatek_mt7987"
          find openwrt/bin/packages -name "amneziawg-tools*.ipk" -exec cp {} "release/amneziawg-tools_${postfix}.ipk" \;
          find openwrt/bin/packages -name "luci-proto-amneziawg*.ipk" -exec cp {} "release/luci-proto-amneziawg_${postfix}.ipk" \;
          find openwrt/bin/packages -name "luci-i18n-amneziawg-ru*.ipk" -exec cp {} "release/luci-i18n-amneziawg-ru_${postfix}.ipk" \;
          find openwrt/bin/targets -name "kmod-amneziawg*.ipk" -exec cp {} "release/kmod-amneziawg_${postfix}.ipk" \;
          echo "Built packages:"
          ls -la release/

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.ipk
          tag_name: ${{ github.ref_name }}
