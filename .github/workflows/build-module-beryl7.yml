name: Build AmneziaWG for GL.iNet Beryl 7

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'GL.iNet Firmware Version (e.g., 4.8.7)'
        required: true
        type: string
        default: '4.8.7'
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  generate-config:
    runs-on: ubuntu-18.04
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from inputs or tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            VERSION="${{ inputs.tag_name }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js "$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-beryl7:
    name: Build GL.iNet Beryl 7 (GL-MT3600BE) - v${{ needs.generate-config.outputs.job-config }}
    runs-on: ubuntu-18.04
    needs: generate-config
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y asciidoc bash bc binutils bzip2 fastjar flex gawk \
          gcc genisoimage gettext git intltool jikespg libgtk2.0-dev libncurses5-dev \
          libssl1.0-dev make mercurial patch perl-modules python2.7-dev rsync ruby \
          sdcc subversion unzip util-linux wget xsltproc zlib1g-dev

      - name: Cache GL.iNet SDK (mt7981)
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: glinet-sdk
          key: glinet-sdk-mt7981-beryl7
          restore-keys: glinet-sdk-mt7981-

      - name: Setup GL.iNet SDK (mt7981)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          # Clone the official gl-inet/sdk repository
          git clone https://github.com/gl-inet/sdk.git
          cd sdk
          
          # Download the mt7981 SDK
          # This clones the openwrt-sdk-mt7981 repo from gl-inet-builder
          ./download.sh mt7981-2102
          
          # The download script creates a directory: sdk/2102/mt7981
          # We'll move it to a known location for caching
          cd ..
          mkdir -p glinet-sdk
          mv sdk/2102/mt7981/* glinet-sdk/
          
          # Clean up the original sdk directory
          rm -rf sdk

      - name: Prepare build environment
        run: |
          cd glinet-sdk
          
          # Update and install feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy your package source into the SDK's package directory
          mkdir -p package/amneziawg
          cp -r ../kmod-amneziawg ../amneziawg-tools ../luci-proto-amneziawg \
                package/amneziawg/
          
          # Configure the build for your packages
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config
          
          make defconfig

      - name: Build AmneziaWG packages
        run: |
          cd glinet-sdk
          
          # Build kmod-amneziawg (kernel module)
          make package/amneziawg/kmod-amneziawg/compile V=s || true
          
          # Build amneziawg-tools (userspace)
          make package/amneziawg/amneziawg-tools/compile V=s
          
          # Build luci-proto-amneziawg (web interface)
          make package/amneziawg/luci-proto-amneziawg/compile V=s
          
          echo "Build completed."
          find bin/ -name "*.ipk" 2>/dev/null || echo "No packages found yet."

      - name: Collect artifacts
        run: |
          mkdir -p awg-release
          cd glinet-sdk
          
          # Find and copy all relevant packages
          find bin/ -name "*amneziawg*.ipk" -exec cp {} ../awg-release/ \; 2>/dev/null
          find bin/ -name "*luci-proto-amneziawg*.ipk" -exec cp {} ../awg-release/ \; 2>/dev/null
          find bin/ -name "*luci-i18n-amneziawg*.ipk" -exec cp {} ../awg-release/ \; 2>/dev/null
          
          echo "Built packages:"
          ls -la ../awg-release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-beryl7-packages
          path: awg-release/

      - name: Create GitHub Release
        if: github.event_name != 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          files: awg-release/*.ipk
          tag_name: v${{ needs.generate-config.outputs.job-config }}
          generate_release_notes: true
