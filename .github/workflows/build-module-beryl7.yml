name: Build for GL-MT3600BE (Beryl 7) on Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build for Beryl 7
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your package source
        uses: actions/checkout@v5
        with:
          path: my-packages

      - name: Checkout GL.iNet OpenWrt 5.4 (Beryl 7 base)
        uses: actions/checkout@v5
        with:
          repository: gl-inet/openwrt-5.4
          ref: openwrt-5.4
          path: openwrt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ \
            gawk gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-setuptools unzip wget \
            xsltproc zlib1g-dev
          python3 -m pip install --upgrade pip setuptools pyelftools

      - name: Cache OpenWrt build tree
        id: cache-openwrt
        uses: actions/cache@v5
        with:
          path: |
            openwrt/
            openwrt-build/
          key: ${{ runner.os }}-glinet-openwrt-5.4-mt7987

      - name: Update and install feeds
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy your packages into the build tree
        run: |
          cp -r my-packages/kmod-amneziawg openwrt/package/
          cp -r my-packages/amneziawg-tools openwrt/package/
          cp -r my-packages/luci-proto-amneziawg openwrt/package/

      - name: Configure for GL-MT3600BE and select packages
        working-directory: openwrt
        run: |
          cat >> .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7987=y
          CONFIG_TARGET_mediatek_mt7987_DEVICE_glinet_gl-mt3600be=y
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF
          make defconfig

      - name: Build packages
        working-directory: openwrt
        run: |
          make -j$(nproc) package/kmod-amneziawg/compile
          make -j$(nproc) package/amneziawg-tools/compile
          make -j$(nproc) package/luci-proto-amneziawg/compile

      - name: Prepare artifacts
        run: |
          mkdir -p release
          postfix="v${GITHUB_REF_NAME}_aarch64_cortex-a53_mediatek_mt7987"
          find openwrt/bin/packages -name "amneziawg-tools*.ipk" -exec cp {} "release/amneziawg-tools_${postfix}.ipk" \;
          find openwrt/bin/packages -name "luci-proto-amneziawg*.ipk" -exec cp {} "release/luci-proto-amneziawg_${postfix}.ipk" \;
          find openwrt/bin/packages -name "luci-i18n-amneziawg-ru*.ipk" -exec cp {} "release/luci-i18n-amneziawg-ru_${postfix}.ipk" \;
          find openwrt/bin/targets -name "kmod-amneziawg*.ipk" -exec cp {} "release/kmod-amneziawg_${postfix}.ipk" \;
          echo "Built packages:"
          ls -la release/

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.ipk
          tag_name: ${{ github.ref_name }}
