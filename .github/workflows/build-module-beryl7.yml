name: Build AmneziaWG for GL-MT3600BE (Beryl 7)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt SDK version (e.g., 21.02.7)'
        required: true
        default: '21.02.7'
        type: string

# Force Node.js 24 for actions to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-beryl7:
    runs-on: ubuntu-22.04
    name: Build for Beryl 7 (MT7981 SDK)

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            asciidoc bash bc binutils bzip2 fastjar flex gawk gcc \
            genisoimage gettext git intltool jikespg libgtk2.0-dev \
            libncurses5-dev libssl-dev make mercurial patch \
            perl-modules python3-dev rsync ruby sdcc subversion unzip \
            util-linux wget xsltproc zlib1g-dev
          # Python 2 is not needed; OpenWrt 21.02 uses Python 3
          # libssl1.0-dev replaced by libssl-dev for Ubuntu 22.04

      - name: Cache OpenWrt SDK (MT7981)
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk-*/
          key: ${{ runner.os }}-sdk-mt7981-${{ inputs.version || '21.02.7' }}

      - name: Download and extract GL.iNet MT7981 SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ inputs.version || '21.02.7' }}"
          SDK_URL="https://github.com/gl-inet-builder/openwrt-sdk-mt7981/releases/download/v${VERSION}/openwrt-sdk-${VERSION}-mediatek-mt7981_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          wget -q "$SDK_URL" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          rm sdk.tar.xz

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          if [ -z "$SDK_DIR" ]; then
            echo "SDK directory not found"
            exit 1
          fi
          WORKSPACE_DIR=$(pwd)
          cd "$SDK_DIR"

          # Update feeds (use default OpenWrt feeds, not GL.iNet's custom ones)
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy custom package sources into SDK package directory
          cp -r "$WORKSPACE_DIR/kmod-amneziawg" package/
          cp -r "$WORKSPACE_DIR/amneziawg-tools" package/
          cp -r "$WORKSPACE_DIR/luci-proto-amneziawg" package/

          # Configure build (only the required packages)
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7981=y
          CONFIG_TARGET_mediatek_mt7981_DEVICE_glinet_gl-mt3000=y
          CONFIG_ALL_NONSHARED=y
          CONFIG_ALL_KMODS=y
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF
          make defconfig

      - name: Build AmneziaWG packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"

          # Build kernel module (kmod)
          echo "Building kmod-amneziawg..."
          make package/kmod-amneziawg/{download,prepare} V=s || true
          make package/kmod-amneziawg/compile V=s

          # Build userspace tools
          echo "Building amneziawg-tools..."
          make package/amneziawg-tools/{download,prepare} V=s
          make package/amneziawg-tools/compile V=s

          # Build LuCI proto
          echo "Building luci-proto-amneziawg..."
          make package/luci-proto-amneziawg/{download,prepare} V=s
          make package/luci-proto-amneziawg/compile V=s

          echo "Build completed. Packages:"
          find bin/ -name "*.?pk" | grep -E "(amneziawg|luci-proto-amneziawg)" | head -20

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          VERSION="${{ inputs.version || '21.02.7' }}"
          mkdir -p release
          POSTFIX="v${VERSION}_aarch64_cortex-a53_mediatek_mt7981"

          # Find and copy each package with a predictable name
          find "$SDK_DIR/bin/packages" -name "amneziawg-tools*.?pk" -exec sh -c '
            file="$1"; postfix="$2"; ext="${file##*.}";
            cp "$file" "release/amneziawg-tools_${postfix}.${ext}"
          ' _ {} "${POSTFIX}" \; || echo "amneziawg-tools not found"

          find "$SDK_DIR/bin/packages" -name "luci-proto-amneziawg*.?pk" -exec sh -c '
            file="$1"; postfix="$2"; ext="${file##*.}";
            cp "$file" "release/luci-proto-amneziawg_${postfix}.${ext}"
          ' _ {} "${POSTFIX}" \; || echo "luci-proto-amneziawg not found"

          find "$SDK_DIR/bin/packages" -name "luci-i18n-amneziawg-ru*.?pk" -exec sh -c '
            file="$1"; postfix="$2"; ext="${file##*.}";
            cp "$file" "release/luci-i18n-amneziawg-ru_${postfix}.${ext}"
          ' _ {} "${POSTFIX}" \; || echo "luci-i18n not found"

          find "$SDK_DIR/bin/targets" -name "kmod-amneziawg*.?pk" -exec sh -c '
            file="$1"; postfix="$2"; ext="${file##*.}";
            cp "$file" "release/kmod-amneziawg_${postfix}.${ext}"
          ' _ {} "${POSTFIX}" \; || echo "kmod-amneziawg not found"

          echo "Built artifacts:"
          ls -la release/

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: release/*.?pk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (on manual dispatch)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: amneziawg-beryl7-${{ inputs.version || '21.02.7' }}
          path: release/
